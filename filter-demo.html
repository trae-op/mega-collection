<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilterEngine Demo</title>
  </head>
  <body>
    <h1>FilterEngine demo (100 items)</h1>

    <h3>City</h3>
    <label><input type="checkbox" name="city" value="Kyiv" /> Kyiv</label>
    <label><input type="checkbox" name="city" value="Lviv" /> Lviv</label>
    <label><input type="checkbox" name="city" value="Odesa" /> Odesa</label>
    <label><input type="checkbox" name="city" value="Dnipro" /> Dnipro</label>
    <label><input type="checkbox" name="city" value="Kharkiv" /> Kharkiv</label>

    <h3>Age</h3>
    <label><input type="checkbox" name="age" value="20" /> 20</label>
    <label><input type="checkbox" name="age" value="25" /> 25</label>
    <label><input type="checkbox" name="age" value="30" /> 30</label>
    <label><input type="checkbox" name="age" value="35" /> 35</label>
    <label><input type="checkbox" name="age" value="40" /> 40</label>

    <p id="count"></p>
    <ul id="results"></ul>

    <script type="module">
      import { FilterEngine, Indexer } from "./dist/filter/index.mjs";

      const cityPool = ["Kyiv", "Lviv", "Odesa", "Dnipro", "Kharkiv"];
      const agePool = [20, 25, 30, 35, 40];

      const users = Array.from({ length: 100 }, (_, index) => {
        const id = index + 1;
        return {
          id,
          name: `User ${id}`,
          city: cityPool[index % cityPool.length],
          age: agePool[index % agePool.length],
        };
      });

      const indexer = new Indexer();
      indexer.buildIndex(users, "city");
      indexer.buildIndex(users, "age");

      const filter = new FilterEngine(indexer);

      const cityCheckboxes = Array.from(
        document.querySelectorAll('input[name="city"]'),
      );
      const ageCheckboxes = Array.from(
        document.querySelectorAll('input[name="age"]'),
      );
      const countNode = document.getElementById("count");
      const resultList = document.getElementById("results");

      function render(list) {
        countNode.textContent = `Found: ${list.length}`;
        resultList.innerHTML = "";

        for (const user of list) {
          const item = document.createElement("li");
          item.textContent = `${user.id}. ${user.name} — ${user.city}, age ${user.age}`;
          resultList.appendChild(item);
        }
      }

      render(users);

      function applyFilter() {
        const selectedCities = cityCheckboxes
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => checkbox.value);
        const selectedAges = ageCheckboxes
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => Number(checkbox.value));

        const criteria = [];
        if (selectedCities.length > 0) {
          criteria.push({ field: "city", values: selectedCities });
        }
        if (selectedAges.length > 0) {
          criteria.push({ field: "age", values: selectedAges });
        }

        if (criteria.length === 0) {
          render(users);
          return;
        }

        const filtered = filter.filter(users, criteria);
        render(filtered);
      }

      for (const checkbox of [...cityCheckboxes, ...ageCheckboxes]) {
        checkbox.addEventListener("change", applyFilter);
      }
    </script>
  </body>
</html>
