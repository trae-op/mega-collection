<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SortEngine Demo</title>
  </head>
  <body>
    <h1>SortEngine demo (100 items)</h1>

    <label for="sortField">Sort field:</label>
    <select id="sortField">
      <option value="id">id</option>
      <option value="name">name</option>
      <option value="age" selected>age</option>
    </select>

    <label for="sortDirection">Direction:</label>
    <select id="sortDirection">
      <option value="asc" selected>asc</option>
      <option value="desc">desc</option>
    </select>

    <p id="count"></p>
    <ul id="results"></ul>

    <script type="module">
      import { SortEngine } from "./dist/sort/index.mjs";

      const users = Array.from({ length: 100 }, (_, index) => {
        const id = index + 1;
        return {
          id,
          name: id % 10 === 0 ? `John ${id}` : `User ${101 - id}`,
          age: 18 + (id % 50),
        };
      });

      const sorter = new SortEngine()
        .buildIndex(users, "id")
        .buildIndex(users, "name")
        .buildIndex(users, "age");

      const sortFieldSelect = document.getElementById("sortField");
      const sortDirectionSelect = document.getElementById("sortDirection");
      const countNode = document.getElementById("count");
      const resultList = document.getElementById("results");

      function render(list) {
        countNode.textContent = `Found: ${list.length}`;
        resultList.innerHTML = "";

        for (const user of list) {
          const item = document.createElement("li");
          item.textContent = `${user.id}. ${user.name} — age ${user.age}`;
          resultList.appendChild(item);
        }
      }

      function applySort() {
        const field = sortFieldSelect.value;
        const direction = sortDirectionSelect.value;

        const sorted = sorter.sort(users, [{ field, direction }]);
        render(sorted);
      }

      sortFieldSelect.addEventListener("change", applySort);
      sortDirectionSelect.addEventListener("change", applySort);

      applySort();
    </script>
  </body>
</html>
