name: Publish to NPM

on:
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          scope: "@devisfuture"
          always-auth: true

      - name: Configure npm authentication
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN is empty or unavailable for this workflow run"
            exit 1
          fi
          CLEAN_TOKEN="$(echo "$NPM_TOKEN" | tr -d '\r\n')"
          echo "//registry.npmjs.org/:_authToken=${CLEAN_TOKEN}" > "$HOME/.npmrc"
          echo "always-auth=true" >> "$HOME/.npmrc"

      - name: Clean before install
        run: |
          rm -f package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install --include=optional --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify npm authentication
        run: |
          npm config get registry
          npm whoami --registry=https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
